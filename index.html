<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课文学习助手</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="control-panel">
    <button id="pyToggle" class="active" onclick="togglePinyin()">拼音 开</button>
    <button id="gameToggleBtn" onclick="toggleGameMode()" style="background: #8e44ad; color: white; border:none;">🎯 生词测试</button>
    <button onclick="toggleTheme()">🌙 模式</button>
</div>

<div class="vocab-notebook">
    <div class="notebook-title">
        <span>📝 我的临时生词本</span>
        <button onclick="forceClearNotebook()" class="clear-btn">清空</button>
    </div>
    <div id="notebookList" class="notebook-list"><span style="color:#999; font-size:13px;">点击词语 Copy 记录生词</span></div>
</div>

<div class="game-container" id="gameContainer">
    <div class="notebook-title">
        <span>🧩 生词测试题</span>
        <button onclick="startQuizGame()" style="cursor:pointer; background:#34495e; color:white; border:none; padding:4px 10px; border-radius:10px;">🔄 重测</button>
    </div>
    <div class="quiz-card">
        <div id="quizProgress" style="font-size:12px; color:#888; margin-bottom:10px;"></div>
        <div class="quiz-question" id="quizQuestion"></div>
        <div class="quiz-pinyin" id="quizPinyin"></div>
        <div class="quiz-options" id="quizOptions"></div>
    </div>
</div>

<div class="article-card">
    <h1 id="articleTitle"></h1>
    <div id="content"></div>
</div>

<div class="buddy-popover" id="buddyPopover" onclick="event.stopPropagation()">
    <div class="pop-title-row"><span id="popWord" class="pop-title"></span><span id="popPinyin" class="pop-pinyin"></span></div>
    <div class="pop-box pop-en"><span class="pop-tag">EN</span><span id="popEn"></span></div>
    <div class="pop-box pop-bm"><span class="pop-tag">MY</span><span id="popBm"></span></div>
    <div class="pop-footer"><button class="pop-btn-copy" onclick="saveToNotebook(event)">Copy 📋</button></div>
    <div class="pop-arrow" id="popArrow"></div>
</div>

<script src="script.js"></script>
</body>
</html>
